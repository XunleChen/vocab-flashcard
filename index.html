<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { text-align: center; color: #fff; margin-bottom: 20px; font-size: 1.8em; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
.tab-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; background: rgba(255,255,255,0.2); color: #fff; transition: all 0.3s; }
.tab-btn.active, .tab-btn:hover { background: #fff; color: #764ba2; }
.panel { display: none; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.panel.active { display: block; }
.unit-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center; }
.unit-btn { padding: 8px 16px; border: 2px solid #764ba2; border-radius: 20px; cursor: pointer; background: #fff; color: #764ba2; font-weight: 600; transition: all 0.3s; }
.unit-btn.active, .unit-btn:hover { background: #764ba2; color: #fff; }
.card-container { perspective: 1000px; margin: 20px auto; max-width: 500px; }
.flashcard { width: 100%; min-height: 280px; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.6s; border-radius: 16px; }
.flashcard.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; min-height: 280px; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
.card-front { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
.card-back { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; transform: rotateY(180deg); }
.card-word { font-size: 2.2em; font-weight: bold; margin-bottom: 10px; }
.card-phonetic { font-size: 1.2em; opacity: 0.9; margin-bottom: 5px; }
.card-pos { font-size: 1em; opacity: 0.8; }
.card-meaning { font-size: 1.8em; font-weight: bold; }
.controls { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.ctrl-btn { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
.btn-know { background: #00c853; color: #fff; }
.btn-know:hover { background: #00a844; }
.btn-dont { background: #ff5252; color: #fff; }
.btn-dont:hover { background: #d32f2f; }
.btn-next { background: #764ba2; color: #fff; }
.btn-next:hover { background: #5a3580; }
.btn-prev { background: #667eea; color: #fff; }
.btn-prev:hover { background: #4a5fd4; }
.progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 15px 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s; }
.progress-text { text-align: center; color: #666; font-size: 14px; margin-bottom: 10px; }
.checkin-section { text-align: center; }
.checkin-btn { padding: 16px 40px; border: none; border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; margin: 20px 0; transition: transform 0.2s; }
.checkin-btn:hover { transform: scale(1.05); }
.checkin-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
.streak { font-size: 1.5em; color: #764ba2; font-weight: bold; margin: 10px 0; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; max-width: 350px; margin: 20px auto; }
.cal-header { text-align: center; font-weight: bold; color: #666; font-size: 12px; padding: 5px; }
.cal-day { text-align: center; padding: 8px 4px; border-radius: 50%; font-size: 12px; color: #333; }
.cal-day.checked { background: #764ba2; color: #fff; }
.cal-day.today { border: 2px solid #f5576c; }
.cal-day.empty { visibility: hidden; }
.word-list { max-height: 500px; overflow-y: auto; }
.word-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
.word-item:hover { background: #f9f5ff; }
.word-item .word { font-weight: 600; color: #333; min-width: 150px; }
.word-item .meaning { color: #666; flex: 1; }
.word-item .status { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.status-mastered { background: #e8f5e9; color: #2e7d32; }
.status-learning { background: #fff3e0; color: #e65100; }
.status-new { background: #e3f2fd; color: #1565c0; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin: 20px 0; }
.stat-card { text-align: center; padding: 20px; border-radius: 12px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
.stat-number { font-size: 2em; font-weight: bold; color: #764ba2; }
.stat-label { font-size: 0.85em; color: #666; margin-top: 5px; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.filter-bar input { flex: 1; min-width: 150px; }
.tip { text-align: center; color: #999; font-size: 13px; margin-top: 10px; }
/* Sync UI */
.sync-bar { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
.sync-bar input { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; background: rgba(255,255,255,0.9); font-size: 14px; width: 160px; }
.sync-btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
.sync-btn-primary { background: #fff; color: #764ba2; }
.sync-btn-primary:hover { background: #f0e6ff; }
.sync-btn-secondary { background: rgba(255,255,255,0.3); color: #fff; }
.sync-btn-secondary:hover { background: rgba(255,255,255,0.5); }
.sync-status { color: #fff; font-size: 12px; opacity: 0.9; }
.sync-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.sync-online { background: #00e676; }
.sync-offline { background: #ff5252; }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 400px; width: 90%; text-align: center; }
.modal h2 { color: #764ba2; margin-bottom: 16px; }
.modal p { color: #666; margin-bottom: 20px; font-size: 14px; }
.modal input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; text-align: center; }
.modal input:focus { border-color: #764ba2; outline: none; }
.modal-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: all 0.3s; }
.modal-btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.modal-btn-primary:hover { opacity: 0.9; }
.modal-btn-secondary { background: #f5f5f5; color: #666; }
.modal-btn-secondary:hover { background: #eee; }
.modal-btn-danger { background: #fff; color: #ff5252; border: 1px solid #ff5252; }
.modal-btn-danger:hover { background: #fff5f5; }
/* Speak button */
.speak-btn { margin-top: 15px; padding: 10px 24px; border: 2px solid rgba(255,255,255,0.7); border-radius: 20px; background: rgba(255,255,255,0.2); color: #fff; font-size: 16px; cursor: pointer; transition: all 0.3s; }
.speak-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
.speak-btn:active { transform: scale(0.95); }
/* Daily Exercise */
.exercise-item { margin-bottom: 20px; padding: 16px; background: #f9f5ff; border-radius: 12px; border-left: 4px solid #764ba2; }
.exercise-item .q-num { font-weight: 700; color: #764ba2; margin-bottom: 8px; }
.exercise-item .q-sentence { font-size: 15px; color: #333; line-height: 1.8; margin-bottom: 8px; }
.exercise-item input { padding: 6px 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; width: 120px; transition: border-color 0.3s; }
.exercise-item input:focus { border-color: #764ba2; outline: none; }
.exercise-item input.correct { border-color: #00c853; background: #e8f5e9; }
.exercise-item input.wrong { border-color: #ff5252; background: #ffebee; }
.exercise-item .q-hint { font-size: 13px; color: #999; margin-top: 4px; }
.exercise-item .q-answer { font-size: 13px; color: #2e7d32; margin-top: 4px; display: none; }
.exercise-item .q-answer.show { display: block; }
.exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.exercise-score { text-align: center; padding: 30px; }
.exercise-score .score-num { font-size: 3em; font-weight: bold; color: #764ba2; }
.exercise-score .score-label { font-size: 1.1em; color: #666; margin-top: 8px; }
.exercise-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.exercise-btns button { padding: 12px 28px; border: none; border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
.btn-submit { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.btn-submit:hover { opacity: 0.9; }
.btn-retry { background: #f5f5f5; color: #764ba2; border: 2px solid #764ba2; }
.btn-retry:hover { background: #f0e6ff; }

<body>
<div class="container">
<h1>📚 八年级上册英语单词卡</h1>

<!-- Sync Bar -->
<div class="sync-bar" id="syncBar">
  <span class="sync-status" id="syncStatus"><span class="sync-indicator sync-offline"></span>未登录</span>
  <button class="sync-btn sync-btn-primary" id="syncLoginBtn" onclick="showSyncModal()">🔑 登录同步</button>
  <button class="sync-btn sync-btn-secondary" id="syncPushBtn" onclick="syncPush()" style="display:none">⬆ 上传</button>
  <button class="sync-btn sync-btn-secondary" id="syncPullBtn" onclick="syncPull()" style="display:none">⬇ 下载</button>
  <button class="sync-btn sync-btn-secondary" onclick="showExportImport()">💾 备份</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('study')">📖 学习</button>
  <button class="tab-btn" onclick="switchTab('exercise')">✏️ 每日一练</button>
  <button class="tab-btn" onclick="switchTab('checkin')">✅ 每日打卡</button>
  <button class="tab-btn" onclick="switchTab('review')">📝 未掌握汇总</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 统计</button>
</div>

<!-- Study Panel -->
<div class="panel active" id="panel-study">
  <div class="unit-selector" id="unitSelector"></div>
  <div class="progress-text" id="progressText">0 / 0</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="card-container">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-word" id="cardWord">--</div>
        <div class="card-phonetic" id="cardPhonetic"></div>
        <div class="card-pos" id="cardPos"></div>
        <button class="speak-btn" onclick="event.stopPropagation();speakWord()">🔊 点读</button>
      </div>
      <div class="card-face card-back">
        <div class="card-meaning" id="cardMeaning">--</div>
      </div>
    </div>
  </div>
  <p class="tip">点击卡片翻转查看释义</p>
  <div class="controls">
    <button class="ctrl-btn btn-prev" onclick="prevCard()">⬅ 上一个</button>
    <button class="ctrl-btn btn-dont" onclick="markWord(0)">❌ 不认识</button>
    <button class="ctrl-btn btn-know" onclick="markWord(1)">✅ 认识</button>
    <button class="ctrl-btn btn-next" onclick="nextCard()">下一个 ➡</button>
  </div>
</div>

<!-- Check-in Panel -->
<div class="panel" id="panel-checkin">
  <div class="checkin-section">
    <h2>每日打卡</h2>
    <div class="streak" id="streakText">🔥 连续打卡 0 天</div>
    <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">📅 今日打卡</button>
    <p class="tip" id="checkinTip"></p>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- Review Panel -->
<div class="panel" id="panel-review">
  <h2 style="margin-bottom:15px;">未掌握单词汇总</h2>
  <div class="filter-bar">
    <select id="reviewUnitFilter" onchange="renderReviewList()"><option value="all">全部单元</option></select>
    <input type="text" id="reviewSearch" placeholder="搜索单词..." oninput="renderReviewList()">
  </div>
  <div class="word-list" id="reviewList"></div>
  <p class="tip" id="reviewTip"></p>
</div>

<!-- Stats Panel -->
<div class="panel" id="panel-stats">
  <h2 style="margin-bottom:15px;">学习统计</h2>
  <div class="stats-grid" id="statsGrid"></div>
  <h3 style="margin:20px 0 10px;">各单元掌握情况</h3>
  <div id="unitStats"></div>
</div>

<!-- Exercise Panel -->
<div class="panel" id="panel-exercise">
  <div class="exercise-header">
    <h2>✏️ 每日一练</h2>
    <span class="tip" id="exerciseUnit"></span>
  </div>
  <p class="tip" style="margin-bottom:15px;">根据句意和提示，用所给单词的正确形式填空。</p>
  <div id="exerciseList"></div>
  <div class="exercise-btns" id="exerciseBtns">
    <button class="btn-submit" onclick="submitExercise()">📝 提交答案</button>
    <button class="btn-retry" onclick="newExercise()">🔄 换一组题</button>
  </div>
  <div class="exercise-score" id="exerciseScore" style="display:none;"></div>
</div>
</div>

<!-- Sync Login Modal -->
<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h2>🔄 多设备同步</h2>
    <p>输入一个同步码（自定义，如手机号或任意英文），在不同设备上输入相同的码即可同步学习进度。</p>
    <input type="text" id="syncCodeInput" placeholder="输入同步码（至少4位）" maxlength="30">
    <button class="modal-btn modal-btn-primary" onclick="syncLogin()">登录 / 注册</button>
    <button class="modal-btn modal-btn-secondary" onclick="closeSyncModal()">取消</button>
    <div id="syncModalMsg" style="margin-top:10px;font-size:13px;color:#ff5252;"></div>
  </div>
</div>

<!-- Export/Import Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>💾 数据备份</h2>
    <p>导出数据到文件，或从文件导入恢复。适合完全离线使用。</p>
    <button class="modal-btn modal-btn-primary" onclick="exportData()">📤 导出数据</button>
    <button class="modal-btn modal-btn-secondary" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="modal-btn modal-btn-danger" onclick="closeExportModal()">关闭</button>
    <div id="exportMsg" style="margin-top:10px;font-size:13px;color:#2e7d32;"></div>
  </div>
</div>

// Process raw data
const words = [];
const units = [];
WORDS_RAW.forEach(function(item) {
  var unit = item[0], num = item[1], word = item[2], phonetic = item[3], pos = item[4], meaning = item[5];
  if (units.indexOf(unit) === -1) units.push(unit);
  words.push({ unit:unit, num:num, word:word, phonetic:phonetic||'', pos:pos||'', meaning:meaning||'' });
});

// Storage helpers
function getData(key, def) { try { return JSON.parse(localStorage.getItem('vocab8s_' + key)) || def; } catch(e) { return def; } }
function setData(key, val) { localStorage.setItem('vocab8s_' + key, JSON.stringify(val)); }

// State
var currentUnit = units[0];
var currentIndex = 0;
var mastery = getData('mastery', {});
var syncCode = getData('syncCode', '');
var syncBinId = getData('syncBinId', '');

// ====== SYNC MODULE ======
// Using JSONBin.io free tier (no signup needed for public bins)
var JSONBIN_API = 'https://api.jsonbin.io/v3';
var JSONBIN_KEY = '$2a$10$placeholder'; // Users get their own with sync code as bin name

function showSyncModal() {
  document.getElementById('syncModal').classList.add('active');
  document.getElementById('syncCodeInput').value = syncCode;
  document.getElementById('syncModalMsg').textContent = '';
}
function closeSyncModal() { document.getElementById('syncModal').classList.remove('active'); }

function showExportImport() { document.getElementById('exportModal').classList.add('active'); }
function closeExportModal() { document.getElementById('exportModal').classList.remove('active'); }

function updateSyncUI() {
  var statusEl = document.getElementById('syncStatus');
  var loginBtn = document.getElementById('syncLoginBtn');
  var pushBtn = document.getElementById('syncPushBtn');
  var pullBtn = document.getElementById('syncPullBtn');
  if (syncCode && syncBinId) {
    statusEl.innerHTML = '<span class="sync-indicator sync-online"></span>已登录: ' + syncCode;
    loginBtn.textContent = '🔄 切换账号';
    pushBtn.style.display = '';
    pullBtn.style.display = '';
  } else if (syncCode) {
    statusEl.innerHTML = '<span class="sync-indicator sync-offline"></span>同步码: ' + syncCode + ' (未连接)';
    loginBtn.textContent = '🔑 重新连接';
    pushBtn.style.display = 'none';
    pullBtn.style.display = 'none';
  } else {
    statusEl.innerHTML = '<span class="sync-indicator sync-offline"></span>未登录';
    loginBtn.textContent = '🔑 登录同步';
    pushBtn.style.display = 'none';
    pullBtn.style.display = 'none';
  }
}

function getAllUserData() {
  return { mastery: mastery, checkins: getData('checkins', []), lastSync: new Date().toISOString() };
}

function applyUserData(data) {
  if (data.mastery) {
    // Merge: keep the higher mastery level
    Object.keys(data.mastery).forEach(function(k) {
      if (!mastery[k] || data.mastery[k] > mastery[k]) mastery[k] = data.mastery[k];
    });
    setData('mastery', mastery);
  }
  if (data.checkins) {
    var local = getData('checkins', []);
    var merged = local.slice();
    data.checkins.forEach(function(d) { if (merged.indexOf(d) === -1) merged.push(d); });
    merged.sort();
    setData('checkins', merged);
  }
}

// Sync Login - create or find bin by sync code
function syncLogin() {
  var code = document.getElementById('syncCodeInput').value.trim();
  if (code.length < 4) {
    document.getElementById('syncModalMsg').textContent = '同步码至少需要4个字符';
    return;
  }
  syncCode = code;
  setData('syncCode', syncCode);
  document.getElementById('syncModalMsg').textContent = '正在连接...';
  
  // Try to find existing bin by searching (use code as bin name)
  // Since JSONBin free tier is limited, we use a simpler approach:
  // Store binId in localStorage keyed by syncCode, and also try to create/read
  var storedBinId = getData('bin_' + syncCode, '');
  if (storedBinId) {
    syncBinId = storedBinId;
    setData('syncBinId', syncBinId);
    document.getElementById('syncModalMsg').textContent = '已连接！正在同步...';
    closeSyncModal();
    updateSyncUI();
    syncPull();
    return;
  }
  
  // Create new bin
  createBin();
}

function createBin() {
  var data = getAllUserData();
  fetch(JSONBIN_API + '/b', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Bin-Name': 'vocab8_' + syncCode, 'X-Access-Key-Id': '' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.metadata && res.metadata.id) {
      syncBinId = res.metadata.id;
      setData('syncBinId', syncBinId);
      setData('bin_' + syncCode, syncBinId);
      document.getElementById('syncModalMsg').textContent = '创建成功！BinID: ' + syncBinId;
      closeSyncModal();
      updateSyncUI();
    } else {
      // JSONBin might need API key, fallback to local-only with export/import
      fallbackSync();
    }
  }).catch(function(e) {
    fallbackSync();
  });
}

function fallbackSync() {
  // Use a simpler approach: encode data in URL hash for sharing
  document.getElementById('syncModalMsg').textContent = '云同步不可用，已切换为本地模式。请使用"备份"功能手动同步。';
  syncBinId = 'local';
  setData('syncBinId', syncBinId);
  setData('bin_' + syncCode, syncBinId);
  setTimeout(function() { closeSyncModal(); updateSyncUI(); }, 2000);
}

function syncPush() {
  if (!syncBinId || syncBinId === 'local') {
    alert('云同步不可用，请使用"备份"功能导出数据。');
    return;
  }
  var data = getAllUserData();
  document.getElementById('syncStatus').innerHTML = '<span class="sync-indicator sync-online"></span>上传中...';
  fetch(JSONBIN_API + '/b/' + syncBinId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); })
  .then(function(res) {
    updateSyncUI();
    alert('数据已上传到云端！');
  }).catch(function(e) {
    updateSyncUI();
    alert('上传失败，请检查网络连接。可以使用"备份"功能手动导出。');
  });
}

function syncPull() {
  if (!syncBinId || syncBinId === 'local') {
    alert('云同步不可用，请使用"备份"功能导入数据。');
    return;
  }
  document.getElementById('syncStatus').innerHTML = '<span class="sync-indicator sync-online"></span>下载中...';
  fetch(JSONBIN_API + '/b/' + syncBinId + '/latest')
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.record) {
      applyUserData(res.record);
      updateSyncUI();
      showCard();
      alert('数据已从云端同步！');
    } else {
      updateSyncUI();
      alert('未找到云端数据。');
    }
  }).catch(function(e) {
    updateSyncUI();
    alert('下载失败，请检查网络连接。');
  });
}

// Export/Import (offline backup)
function exportData() {
  var data = getAllUserData();
  data.syncCode = syncCode;
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '单词卡数据备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('exportMsg').textContent = '导出成功！';
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      applyUserData(data);
      if (data.syncCode) { syncCode = data.syncCode; setData('syncCode', syncCode); }
      document.getElementById('exportMsg').textContent = '导入成功！数据已合并。';
      updateSyncUI();
      showCard();
    } catch(err) {
      document.getElementById('exportMsg').textContent = '导入失败：文件格式不正确。';
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', ['study','exercise','checkin','review','stats'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'exercise') renderExercise();
  if (tab === 'checkin') renderCheckin();
  if (tab === 'review') renderReviewList();
  if (tab === 'stats') renderStats();
}

function renderUnits() {
  var sel = document.getElementById('unitSelector');
  sel.innerHTML = units.map(function(u) {
    return '<button class="unit-btn '+(u===currentUnit?'active':'')+'" onclick="selectUnit(\''+u+'\')">'+u+'</button>';
  }).join('');
  var rf = document.getElementById('reviewUnitFilter');
  rf.innerHTML = '<option value="all">全部单元</option>' + units.map(function(u) { return '<option value="'+u+'">'+u+'</option>'; }).join('');
}

function selectUnit(unit) { currentUnit = unit; currentIndex = 0; renderUnits(); showCard(); }
function getUnitWords() { return words.filter(function(w) { return w.unit === currentUnit; }); }

function showCard() {
  var unitWords = getUnitWords();
  if (unitWords.length === 0) return;
  if (currentIndex >= unitWords.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = unitWords.length - 1;
  var w = unitWords[currentIndex];
  document.getElementById('cardWord').textContent = w.word;
  document.getElementById('cardPhonetic').textContent = w.phonetic;
  document.getElementById('cardPos').textContent = w.pos;
  document.getElementById('cardMeaning').textContent = w.meaning;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('progressText').textContent = (currentIndex + 1) + ' / ' + unitWords.length;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / unitWords.length * 100) + '%';
}

function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }
function nextCard() { currentIndex++; showCard(); }
function prevCard() { currentIndex--; showCard(); }

function speakWord() {
  var unitWords = getUnitWords();
  var w = unitWords[currentIndex];
  if (!w) return;
  var text = w.word;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-GB';
    utterance.rate = 0.8;
    // Try to find an English voice
    var voices = window.speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang.indexOf('en') === 0) { utterance.voice = voices[i]; break; }
    }
    window.speechSynthesis.speak(utterance);
  } else {
    alert('当前浏览器不支持语音播放，请使用 Chrome 或 Edge。');
  }
}

function markWord(level) {
  var unitWords = getUnitWords();
  var w = unitWords[currentIndex];
  var key = w.unit + '_' + w.num;
  if (level === 1) { mastery[key] = (mastery[key] || 0) >= 1 ? 2 : 1; }
  else { mastery[key] = 1; }
  setData('mastery', mastery);
  nextCard();
}

// Check-in
function getCheckins() { return getData('checkins', []); }
function getTodayStr() { return new Date().toISOString().slice(0, 10); }

function doCheckin() {
  var checkins = getCheckins();
  var today = getTodayStr();
  if (checkins.indexOf(today) === -1) { checkins.push(today); setData('checkins', checkins); }
  renderCheckin();
}

function renderCheckin() {
  var checkins = getCheckins();
  var today = getTodayStr();
  var btn = document.getElementById('checkinBtn');
  if (checkins.indexOf(today) !== -1) {
    btn.disabled = true; btn.textContent = '✅ 今日已打卡';
    document.getElementById('checkinTip').textContent = '太棒了！今天已经完成打卡！';
  } else {
    btn.disabled = false; btn.textContent = '📅 今日打卡';
    document.getElementById('checkinTip').textContent = '';
  }
  var streak = 0, d = new Date();
  if (checkins.indexOf(today) !== -1) {
    while (checkins.indexOf(d.toISOString().slice(0,10)) !== -1) { streak++; d.setDate(d.getDate()-1); }
  } else {
    d.setDate(d.getDate()-1);
    while (checkins.indexOf(d.toISOString().slice(0,10)) !== -1) { streak++; d.setDate(d.getDate()-1); }
  }
  document.getElementById('streakText').textContent = '🔥 连续打卡 ' + streak + ' 天';
  renderCalendar(checkins);
}

function renderCalendar(checkins) {
  var cal = document.getElementById('calendar');
  var today = new Date();
  var year = today.getFullYear(), month = today.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var headers = ['日','一','二','三','四','五','六'];
  var html = headers.map(function(h){ return '<div class="cal-header">'+h+'</div>'; }).join('');
  for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (var dd = 1; dd <= daysInMonth; dd++) {
    var ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var isToday = dd === today.getDate();
    var isChecked = checkins.indexOf(ds) !== -1;
    html += '<div class="cal-day '+(isChecked?'checked':'')+' '+(isToday?'today':'')+'">'+dd+'</div>';
  }
  cal.innerHTML = html;
}

// Review
function renderReviewList() {
  var filter = document.getElementById('reviewUnitFilter').value;
  var search = document.getElementById('reviewSearch').value.toLowerCase();
  var unmastered = words.filter(function(w) {
    var key = w.unit + '_' + w.num;
    var level = mastery[key] || 0;
    if (level >= 2) return false;
    if (filter !== 'all' && w.unit !== filter) return false;
    if (search && w.word.toLowerCase().indexOf(search) === -1 && w.meaning.indexOf(search) === -1) return false;
    return true;
  });
  var list = document.getElementById('reviewList');
  if (unmastered.length === 0) {
    list.innerHTML = '<p style="text-align:center;padding:40px;color:#666;">🎉 没有未掌握的单词！</p>';
    document.getElementById('reviewTip').textContent = '';
    return;
  }
  list.innerHTML = unmastered.map(function(w) {
    var key = w.unit + '_' + w.num;
    var level = mastery[key] || 0;
    var sc = level === 0 ? 'status-new' : 'status-learning';
    var st = level === 0 ? '未学习' : '学习中';
    return '<div class="word-item"><span class="word">'+w.word+'</span><span class="meaning">'+w.meaning+' <small style="color:#999">'+w.unit+'</small></span><span class="status '+sc+'">'+st+'</span></div>';
  }).join('');
  document.getElementById('reviewTip').textContent = '共 ' + unmastered.length + ' 个单词未掌握';
}

// Stats
function renderStats() {
  var total = words.length, mastered = 0, learning = 0, newW = 0;
  words.forEach(function(w) {
    var level = mastery[w.unit+'_'+w.num] || 0;
    if (level >= 2) mastered++; else if (level === 1) learning++; else newW++;
  });
  var checkins = getCheckins();
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="stat-number">'+total+'</div><div class="stat-label">总单词数</div></div>'+
    '<div class="stat-card"><div class="stat-number" style="color:#2e7d32">'+mastered+'</div><div class="stat-label">已掌握</div></div>'+
    '<div class="stat-card"><div class="stat-number" style="color:#e65100">'+learning+'</div><div class="stat-label">学习中</div></div>'+
    '<div class="stat-card"><div class="stat-number" style="color:#1565c0">'+newW+'</div><div class="stat-label">未学习</div></div>'+
    '<div class="stat-card"><div class="stat-number">'+checkins.length+'</div><div class="stat-label">累计打卡</div></div>'+
    '<div class="stat-card"><div class="stat-number">'+(total>0?Math.round(mastered/total*100):0)+'%</div><div class="stat-label">掌握率</div></div>';
  var unitHtml = '<div style="margin-top:10px;">';
  units.forEach(function(u) {
    var uw = words.filter(function(w){ return w.unit === u; });
    var um = uw.filter(function(w){ return (mastery[w.unit+'_'+w.num] || 0) >= 2; }).length;
    var pct = uw.length > 0 ? Math.round(um / uw.length * 100) : 0;
    unitHtml += '<div style="display:flex;align-items:center;margin:8px 0;"><span style="min-width:60px;font-weight:600;">'+u+'</span><div style="flex:1;height:20px;background:#e0e0e0;border-radius:10px;overflow:hidden;margin:0 10px;"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;"></div></div><span style="min-width:80px;text-align:right;font-size:13px;">'+um+'/'+uw.length+' ('+pct+'%)</span></div>';
  });
  unitHtml += '</div>';
  document.getElementById('unitStats').innerHTML = unitHtml;

var currentExerciseSet = [];
var exerciseSubmitted = false;

function renderExercise() {
  if (currentExerciseSet.length === 0 || exerciseSubmitted) {
    newExercise();
  }
}

function newExercise() {
  exerciseSubmitted = false;
  document.getElementById('exerciseScore').style.display = 'none';
  document.getElementById('exerciseBtns').style.display = 'flex';
  // Randomly pick 10 questions from the bank
  var pool = EXERCISE_BANK.slice();
  currentExerciseSet = [];
  for (var i = 0; i < 10 && pool.length > 0; i++) {
    var idx = Math.floor(Math.random() * pool.length);
    currentExerciseSet.push(pool[idx]);
    pool.splice(idx, 1);
  }
  renderExerciseItems();
}

function renderExerciseItems() {
  var html = '';
  currentExerciseSet.forEach(function(q, i) {
    var parts = q[0].split('_____');
    html += '<div class="exercise-item" id="exItem' + i + '">' +
      '<div class="q-num">第 ' + (i+1) + ' 题 <small style="color:#999">(' + q[3] + ')</small></div>' +
      '<div class="q-sentence">' + parts[0] + '<input type="text" id="exInput' + i + '" autocomplete="off" placeholder="填写"> ' + (parts[1] || '') + '</div>' +
      '<div class="q-hint">提示: ' + q[1] + '</div>' +
      '<div class="q-answer" id="exAnswer' + i + '">正确答案: <strong>' + q[2] + '</strong></div>' +
      '</div>';
  });
  document.getElementById('exerciseList').innerHTML = html;
  document.getElementById('exerciseUnit').textContent = '共10题，随机抽取';
}

function submitExercise() {
  if (exerciseSubmitted) return;
  exerciseSubmitted = true;
  var correct = 0;
  currentExerciseSet.forEach(function(q, i) {
    var input = document.getElementById('exInput' + i);
    var answer = q[2];
    var userVal = input.value.trim();
    var answerEl = document.getElementById('exAnswer' + i);
    answerEl.classList.add('show');
    if (userVal.toLowerCase() === answer.toLowerCase()) {
      correct++;
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
    }
    input.disabled = true;
  });
  // Show score
  var scoreHtml = '<div class="score-num">' + correct + ' / 10</div>' +
    '<div class="score-label">' + getScoreComment(correct) + '</div>';
  document.getElementById('exerciseScore').innerHTML = scoreHtml;
  document.getElementById('exerciseScore').style.display = 'block';
  // Save exercise history
  var history = getData('exerciseHistory', []);
  history.push({ date: getTodayStr(), score: correct, total: 10 });
  setData('exerciseHistory', history);
}

function getScoreComment(score) {
  if (score === 10) return '🎉 满分！太棒了！';
  if (score >= 8) return '👍 优秀！继续保持！';
  if (score >= 6) return '😊 不错，还有提升空间！';
  if (score >= 4) return '💪 加油，多复习几遍！';
  return '📚 需要多看看单词卡哦！';
}
